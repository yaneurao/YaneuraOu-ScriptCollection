<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">peta_shock / peta_read と peta_next / peta_refutation</title>
  <desc id="desc">peta_shockは通常定跡DBからpeta_bookを作って読み込み、peta_readは外部で作ったpeta_bookを読み込み、peta_nextまたはpeta_refutationで次に掘る局面ファイルを作る流れ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .box { fill: #ffffff; stroke: #315f72; stroke-width: 2; rx: 10; }
      .db { fill: #f4f0ff; stroke: #6b5cad; }
      .tool { fill: #e8f4f8; }
      .file { fill: #fff4df; stroke: #a66b00; }
      .external { fill: #fffaf0; stroke: #a66b00; stroke-dasharray: 8 6; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .hint { stroke: #8a6a1f; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 6; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 18px; text-anchor: middle; }
      .small { font-size: 14px; fill: #405864; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #405864; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1080" height="430"/>
  <text class="text" x="540" y="38" style="font-size:23px">peta_book を読み込み、peta_next または peta_refutation で次に掘る局面を探す。</text>

  <rect class="box db" x="40" y="95" width="170" height="96"/>
  <text class="text" x="125" y="129">通常定跡DB</text>
  <text class="mono" x="125" y="158" text-anchor="middle">book_miner-...</text>
  <text class="text small" x="125" y="181">掘った結果</text>

  <path class="line" d="M 220 143 H 268"/>
  <rect class="box tool" x="278" y="95" width="184" height="96"/>
  <text class="text" x="370" y="124">peta_shock</text>
  <text class="text small" x="370" y="149">p コマンド</text>
  <text class="text small" x="370" y="172">作成して読み込む</text>

  <path class="line" d="M 472 143 H 520"/>
  <rect class="box db" x="530" y="95" width="170" height="96"/>
  <text class="text" x="615" y="129">peta_book</text>
  <text class="mono" x="615" y="158" text-anchor="middle">peta_book-...</text>
  <text class="text small" x="615" y="181">メモリ上で辿る</text>

  <path class="line" d="M 710 143 H 728"/>
  <rect class="box tool" x="738" y="95" width="184" height="96"/>
  <text class="text" x="830" y="124">peta_next</text>
  <text class="text small" x="830" y="148">または</text>
  <text class="text" x="830" y="172">peta_refutation</text>

  <path class="line" d="M 932 143 H 940"/>
  <rect class="box file" x="950" y="105" width="110" height="76"/>
  <text class="mono" x="1005" y="136" text-anchor="middle">think</text>
  <text class="mono" x="1005" y="157" text-anchor="middle">sfens.txt</text>

  <path class="hint" d="M 125 196 V 296 H 258"/>
  <rect class="box external" x="278" y="255" width="210" height="96"/>
  <text class="text" x="383" y="284">別マシン/手動</text>
  <text class="text small" x="383" y="309">makebook peta_shock</text>
  <text class="text small" x="383" y="332">先にpeta_bookを作る</text>

  <path class="hint" d="M 498 303 H 525"/>
  <rect class="box file" x="535" y="255" width="200" height="96"/>
  <text class="text" x="635" y="286">book/backup/</text>
  <text class="mono" x="635" y="315" text-anchor="middle">peta_book-....db</text>
  <text class="text small" x="635" y="337">この環境へ置く</text>

  <path class="line" d="M 745 303 H 770"/>
  <rect class="box tool" x="780" y="255" width="154" height="96"/>
  <text class="text" x="857" y="286">peta_read</text>
  <text class="text small" x="857" y="311">r コマンド</text>
  <text class="text small" x="857" y="334">読み込みだけ</text>

  <path class="line" d="M 857 250 V 215 H 615 V 201"/>
</svg>
