<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">peta_shock と peta_next</title>
  <desc id="desc">通常定跡DBをpeta_shock化し、peta_nextで次に掘る局面ファイルを作る流れ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .box { fill: #ffffff; stroke: #315f72; stroke-width: 2; rx: 10; }
      .db { fill: #f4f0ff; stroke: #6b5cad; }
      .tool { fill: #e8f4f8; }
      .file { fill: #fff4df; stroke: #a66b00; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 18px; text-anchor: middle; }
      .small { font-size: 14px; fill: #405864; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #405864; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="360"/>
  <text class="text" x="490" y="38" style="font-size:23px">peta_shock は定跡を計算し直す。peta_next は次に伸ばす局面を探す。</text>

  <rect class="box db" x="50" y="115" width="170" height="105"/>
  <text class="text" x="135" y="150">通常定跡DB</text>
  <text class="mono" x="135" y="180" text-anchor="middle">book_miner-...</text>
  <text class="text small" x="135" y="203">掘った結果</text>

  <path class="line" d="M 230 168 H 315"/>
  <rect class="box tool" x="325" y="115" width="155" height="105"/>
  <text class="text" x="402" y="152">手順1</text>
  <text class="text" x="402" y="180">peta_shock</text>
  <text class="text small" x="402" y="203">min-max反映</text>

  <path class="line" d="M 490 168 H 575"/>
  <rect class="box db" x="585" y="115" width="170" height="105"/>
  <text class="text" x="670" y="150">peta定跡DB</text>
  <text class="mono" x="670" y="180" text-anchor="middle">peta_book-...</text>
  <text class="text small" x="670" y="203">高速に辿る用</text>

  <path class="line" d="M 670 225 V 238 H 272 V 287 H 290"/>
  <rect class="box tool" x="300" y="250" width="190" height="74"/>
  <text class="text" x="395" y="279">手順2 peta_next</text>
  <text class="text small" x="395" y="303">leafの先を探す</text>

  <path class="line" d="M 500 287 H 605"/>
  <rect class="box file" x="615" y="250" width="230" height="74"/>
  <text class="text" x="730" y="279">think_sfens.txt</text>
  <text class="text small" x="730" y="303">手順3 enqueueへ</text>
</svg>
