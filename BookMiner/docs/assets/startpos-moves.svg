<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">startpos moves の意味</title>
  <desc id="desc">初期局面から指し手を順に進めて到達局面を作る流れ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .box { fill: #ffffff; stroke: #315f72; stroke-width: 2; rx: 10; }
      .move { fill: #e8f4f8; stroke: #315f72; stroke-width: 2; rx: 10; }
      .goal { fill: #fff4df; stroke: #a66b00; stroke-width: 2; rx: 10; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 20px; text-anchor: middle; }
      .small { font-size: 15px; fill: #405864; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; fill: #18323d; }
      .note { font-size: 17px; fill: #5b4a24; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="920" height="300"/>

  <text class="text" x="460" y="38">startpos moves ... は「初期局面から指し手を順番に進める」書き方</text>

  <rect class="box" x="40" y="90" width="150" height="72"/>
  <text class="text" x="115" y="120">初期局面</text>
  <text class="text small" x="115" y="145">startpos</text>

  <path class="line" d="M 198 126 H 278"/>
  <rect class="move" x="286" y="90" width="110" height="72"/>
  <text class="text" x="341" y="120">7g7f</text>
  <text class="text small" x="341" y="145">1手目</text>

  <path class="line" d="M 404 126 H 484"/>
  <rect class="move" x="492" y="90" width="110" height="72"/>
  <text class="text" x="547" y="120">3c3d</text>
  <text class="text small" x="547" y="145">2手目</text>

  <path class="line" d="M 610 126 H 690"/>
  <rect class="move" x="698" y="90" width="110" height="72"/>
  <text class="text" x="753" y="120">2g2f</text>
  <text class="text small" x="753" y="145">3手目</text>

  <path class="line" d="M 753 166 V 205 H 690"/>
  <rect class="goal" x="395" y="195" width="290" height="64"/>
  <text class="text" x="540" y="222">この局面を表す</text>
  <text class="text note" x="540" y="247">BookMiner はここまで指し手を再生する</text>

  <text class="code" x="105" y="238">startpos moves 7g7f 3c3d 2g2f</text>
</svg>
