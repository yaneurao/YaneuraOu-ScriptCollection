<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" role="img" aria-labelledby="title desc">
  <title id="title">BookMiner GUI の基本手順</title>
  <desc id="desc">手順0または手順1のpeta_shock、外部で作ったpeta_bookを読むpeta_read、手順2でpeta_next、peta_next_refutation、peta_refutation、peta_depth_gapによりthink_sfens.txtを作り、手順3でenqueueし、手順4の自動enqueueでは自動チェックされた手順2をthink_sfens-tmp.txtにまとめてenqueueする流れ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .box { fill: #ffffff; stroke: #315f72; stroke-width: 2; rx: 12; }
      .alt { fill: #e8f4f8; }
      .main { fill: #eef8ed; stroke: #387a38; }
      .file { fill: #fff4df; stroke: #a66b00; }
      .save { fill: #f4f0ff; stroke: #6b5cad; }
      .external { fill: #fffaf0; stroke: #a66b00; stroke-dasharray: 8 6; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #56707d; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-dasharray: 10 7; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 18px; text-anchor: middle; }
      .small { font-size: 14px; fill: #405864; }
      .step { font-size: 15px; font-weight: 700; fill: #315f72; }
      .note { font-size: 16px; fill: #5b4a24; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1060" height="560"/>
  <text class="text" x="530" y="36" style="font-size:23px">BookMiner の基本は「局面を用意 → enqueue → 掘る → 次を作る」のくり返し</text>

  <rect class="box alt" x="58" y="105" width="178" height="82"/>
  <text class="text step" x="147" y="130">手順0</text>
  <text class="text" x="147" y="154">棋譜抽出</text>
  <text class="text small" x="147" y="176">KifManager</text>

  <rect class="box" x="292" y="80" width="224" height="82"/>
  <text class="text step" x="404" y="105">手順1</text>
  <text class="text" x="404" y="129">peta_shock / peta_read</text>
  <text class="text small" x="404" y="151">p:作成+読込 / r:読込</text>

  <rect class="box" x="302" y="205" width="204" height="82"/>
  <text class="text step" x="404" y="230">手順2</text>
  <text class="text" x="404" y="252">peta_next (n)</text>
  <text class="text small" x="404" y="273">next_refu.(nf) / refutation(f) / depth_gap(d)</text>

  <rect class="box file" x="575" y="150" width="200" height="82"/>
  <text class="text" x="675" y="181">think_sfens.txt</text>
  <text class="text small" x="675" y="205">次に掘る局面</text>

  <rect class="box main" x="575" y="315" width="200" height="86"/>
  <text class="text step" x="675" y="340">手順3</text>
  <text class="text" x="675" y="365">enqueue</text>
  <text class="text small" x="675" y="388">queueに積む</text>

  <rect class="box main" x="825" y="315" width="170" height="86"/>
  <text class="text" x="910" y="353">探索worker</text>
  <text class="text small" x="910" y="377">局面を掘る</text>

  <rect class="box save" x="825" y="105" width="170" height="82"/>
  <text class="text step" x="910" y="130">手順5</text>
  <text class="text" x="910" y="154">DB手動保存</text>
  <text class="text small" x="910" y="176">必要な時だけ</text>

  <path class="line" d="M 147 105 V 66 H 675 V 140"/>
  <text class="text note" x="147" y="216">初回や棋譜から掘るとき</text>

  <path class="line" d="M 404 162 V 195"/>
  <path class="line" d="M 506 246 H 565 V 191 H 575"/>
  <path class="line" d="M 675 232 V 305"/>
  <path class="line" d="M 775 358 H 815"/>

  <rect class="box external" x="58" y="250" width="220" height="82"/>
  <text class="text" x="168" y="279">外部peta_shock済み</text>
  <text class="text small" x="168" y="303">peta_bookを置く</text>
  <text class="text small" x="168" y="323">peta_readの前提</text>
  <path class="line" d="M 278 291 H 292 V 121"/>

  <path class="loop" d="M 910 405 V 495 H 270 V 121 H 282"/>
  <text class="text small" x="540" y="522">掘ったら、また手順1へ戻って次の局面を作る</text>

  <path class="line" d="M 910 315 V 197"/>

  <rect x="58" y="355" width="320" height="94" rx="12" fill="#ffffff" stroke="#56707d" stroke-width="2" stroke-dasharray="8 6"/>
  <text class="text step" x="218" y="384">手順4 自動enqueue</text>
  <text class="text small" x="218" y="411">queueが少なくなったら</text>
  <text class="text small" x="218" y="433">自動チェックした手順2をtmpに集約</text>
  <path class="loop" d="M 378 402 H 514 V 358 H 565"/>
</svg>
