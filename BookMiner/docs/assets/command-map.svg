<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620" role="img" aria-labelledby="title desc">
  <title id="title">BookMiner.py の主要コマンド早見図</title>
  <desc id="desc">BookMiner.pyの主要コマンドを目的別にまとめた図</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .group { fill: #ffffff; stroke: #315f72; stroke-width: 2; }
      .cmd { fill: #e8f4f8; stroke: #315f72; stroke-width: 2; }
      .save { fill: #f4f0ff; stroke: #6b5cad; stroke-width: 2; }
      .make { fill: #fff4df; stroke: #a66b00; stroke-width: 2; }
      .misc { fill: #eef8ed; stroke: #387a38; stroke-width: 2; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 18px; text-anchor: middle; }
      .small { font-size: 14px; fill: #405864; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 22px; font-weight: 700; fill: #18323d; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1060" height="620"/>
  <text class="text" x="530" y="38" style="font-size:23px">BookMiner.py のコマンドは、目的ごとに覚えると迷いにくい</text>

  <rect class="group" x="55" y="90" width="280" height="205" rx="14"/>
  <text class="text" x="195" y="122">局面を積む</text>
  <rect class="cmd" x="92" y="145" width="86" height="58" rx="10"/>
  <text class="code" x="135" y="181">e</text>
  <text class="text small" x="235" y="169">eval limit設定</text>
  <text class="text small" x="235" y="191">例: e 400</text>
  <rect class="cmd" x="92" y="220" width="86" height="58" rx="10"/>
  <text class="code" x="135" y="256">t</text>
  <text class="text small" x="235" y="244">think_sfens.txtを読む</text>
  <text class="text small" x="235" y="266">queueへenqueue</text>

  <rect class="group" x="390" y="90" width="280" height="205" rx="14"/>
  <text class="text" x="530" y="122">次を作る周回</text>
  <rect class="make" x="430" y="145" width="86" height="58" rx="10"/>
  <text class="code" x="473" y="181">p</text>
  <text class="text small" x="585" y="169">書き出し</text>
  <text class="text small" x="585" y="191">+ peta_shock</text>
  <rect class="make" x="430" y="220" width="86" height="58" rx="10"/>
  <text class="code" x="473" y="256">n</text>
  <text class="text small" x="585" y="244">leafの先を探す</text>
  <text class="text small" x="585" y="266">think_sfens.txt作成</text>
  <path class="line" d="M 473 203 V 210"/>

  <rect class="group" x="725" y="90" width="280" height="205" rx="14"/>
  <text class="text" x="865" y="122">保存と終了</text>
  <rect class="save" x="765" y="145" width="86" height="58" rx="10"/>
  <text class="code" x="808" y="181">w</text>
  <text class="text small" x="918" y="169">DBを書き出す</text>
  <text class="text small" x="918" y="191">必要なら ply指定</text>
  <rect class="save" x="765" y="220" width="86" height="58" rx="10"/>
  <text class="code" x="808" y="256">q</text>
  <text class="text small" x="918" y="244">保存して終了</text>
  <text class="text small" x="918" y="266">通常はこちら</text>

  <rect class="group" x="55" y="345" width="280" height="185" rx="14"/>
  <text class="text" x="195" y="377">peta_bookを読む</text>
  <rect class="make" x="92" y="410" width="86" height="58" rx="10"/>
  <text class="code" x="135" y="446">r</text>
  <text class="text small" x="235" y="434">外部変換済み</text>
  <text class="text small" x="235" y="456">peta_bookを読む</text>
  <text class="text small" x="195" y="502">先にbook/backupへ置く</text>

  <rect class="group" x="390" y="345" width="280" height="185" rx="14"/>
  <text class="text" x="530" y="377">確認・修復</text>
  <rect class="misc" x="422" y="410" width="62" height="48" rx="10"/>
  <text class="code" x="453" y="441">i</text>
  <rect class="misc" x="499" y="410" width="62" height="48" rx="10"/>
  <text class="code" x="530" y="441">m</text>
  <rect class="misc" x="576" y="410" width="62" height="48" rx="10"/>
  <text class="code" x="607" y="441">b</text>
  <text class="text small" x="530" y="490">通常の周回ではほぼ使わない</text>

  <rect class="group" x="725" y="345" width="280" height="185" rx="14"/>
  <text class="text" x="865" y="377">破棄して終了</text>
  <rect class="save" x="812" y="410" width="86" height="58" rx="10"/>
  <text class="code" x="855" y="446">!</text>
  <text class="text small" x="865" y="502">保存しないので注意</text>

  <path class="line" d="M 335 252 H 380"/>
  <path class="line" d="M 670 252 H 715"/>
  <text class="text small" x="530" y="575">よく使う流れ: e → t → p → n → t → p → n ...</text>
</svg>
