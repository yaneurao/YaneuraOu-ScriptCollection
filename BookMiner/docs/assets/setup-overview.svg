<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" role="img" aria-labelledby="title desc">
  <title id="title">BookMiner のセットアップ全体図</title>
  <desc id="desc">BookMinerフォルダ、CommonLib、設定ファイル、探索用エンジン、YO-MATERIAL.exeの関係</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .panel { fill: #ffffff; stroke: #315f72; stroke-width: 2; }
      .bookminer { fill: #e8f4f8; }
      .settings { fill: #fff4df; stroke: #a66b00; }
      .engine { fill: #eef8ed; stroke: #387a38; }
      .material { fill: #f4f0ff; stroke: #6b5cad; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 18px; text-anchor: middle; }
      .small { font-size: 14px; fill: #405864; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #405864; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1060" height="560"/>
  <text class="text" x="530" y="38" style="font-size:23px">BookMiner は「Pythonスクリプト + 設定 + 2種類のエンジン」で動く</text>

  <rect class="panel bookminer" x="330" y="95" width="310" height="270" rx="14"/>
  <text class="text" x="485" y="126">BookMiner/</text>
  <rect x="365" y="150" width="240" height="44" rx="8" fill="#ffffff" stroke="#315f72"/>
  <text class="mono" x="485" y="178" text-anchor="middle">BookMiner.py</text>
  <rect x="365" y="205" width="240" height="44" rx="8" fill="#ffffff" stroke="#315f72"/>
  <text class="mono" x="485" y="233" text-anchor="middle">BookMiner-gui.py</text>
  <rect class="material" x="365" y="260" width="240" height="44" rx="8"/>
  <text class="mono" x="485" y="288" text-anchor="middle">YO-MATERIAL.exe</text>
  <rect x="365" y="315" width="240" height="32" rx="8" fill="#ffffff" stroke="#315f72"/>
  <text class="mono" x="485" y="337" text-anchor="middle">book/backup/</text>

  <rect class="panel" x="60" y="110" width="210" height="90" rx="14"/>
  <text class="text" x="165" y="145">CommonLib/</text>
  <text class="mono" x="165" y="174" text-anchor="middle">YaneShogiLib.py</text>
  <path class="line" d="M 270 155 H 355"/>
  <text class="text small" x="313" y="140">使う</text>

  <rect class="panel settings" x="45" y="250" width="260" height="150" rx="14"/>
  <text class="text" x="175" y="292">settings/</text>
  <text class="mono" x="175" y="318" text-anchor="middle">*-sample.json5</text>
  <text class="text small" x="175" y="344">コピーして編集</text>
  <text class="mono" x="175" y="372" text-anchor="middle">engine_settings.json5</text>
  <text class="mono" x="175" y="392" text-anchor="middle">book_miner_settings.json5</text>
  <path class="line" d="M 305 333 H 355"/>

  <rect class="panel engine" x="745" y="95" width="250" height="140" rx="14"/>
  <text class="text" x="870" y="128">探索用エンジン</text>
  <text class="text small" x="870" y="156">やねうら王 / 水匠 など</text>
  <text class="text small" x="870" y="183">local または ssh</text>
  <text class="text small" x="870" y="210">複数プロセス起動可</text>
  <path class="line" d="M 640 172 H 735"/>
  <text class="text small" x="688" y="157">goで探索</text>

  <rect class="panel material" x="745" y="285" width="250" height="120" rx="14"/>
  <text class="text" x="870" y="318">MATERIAL版</text>
  <text class="mono" x="870" y="348" text-anchor="middle">YO-MATERIAL.exe</text>
  <text class="text small" x="870" y="376">peta_shock専用</text>
  <path class="line" d="M 640 282 H 735 V 345"/>

  <rect class="panel" x="335" y="430" width="300" height="74" rx="14"/>
  <text class="text" x="485" y="459">Python package</text>
  <text class="mono" x="485" y="488" text-anchor="middle">cshogi / json5</text>
  <path class="line" d="M 485 430 V 375"/>
</svg>
