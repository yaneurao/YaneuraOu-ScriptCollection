<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">peta unsolved の入力と出力</title>
  <desc id="desc">think_unsolved_sfens.txt に書いた負け棋譜を途中局面に分解し、それぞれから peta_book の best PV を leaf まで辿って think_sfens.txt に書き出す流れ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f72"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .box { fill: #ffffff; stroke: #315f72; stroke-width: 2; rx: 10; }
      .file { fill: #fff4df; stroke: #a66b00; }
      .work { fill: #e8f4f8; }
      .db { fill: #f4f0ff; stroke: #6b5cad; }
      .queue { fill: #eaf7ea; stroke: #4c7a42; }
      .line { stroke: #315f72; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .hint { stroke: #8a6a1f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 6; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18323d; font-size: 18px; text-anchor: middle; }
      .small { font-size: 14px; fill: #405864; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; fill: #405864; }
      .left { text-anchor: start; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1080" height="520"/>
  <text class="text" x="540" y="38" style="font-size:23px">peta unsolved は、負け棋譜の途中局面から「次に掘るleaf」を作る。</text>

  <rect class="box file" x="35" y="86" width="260" height="132"/>
  <text class="text" x="165" y="119">入力</text>
  <text class="mono" x="165" y="145" text-anchor="middle">book/think_unsolved_sfens.txt</text>
  <text class="mono left" x="55" y="176">startpos moves 7g7f 3c3d</text>
  <text class="mono left" x="55" y="197">  2g2f 8c8d 2f2e ...</text>

  <path class="line" d="M 305 152 H 345"/>
  <rect class="box work" x="355" y="70" width="270" height="164"/>
  <text class="text" x="490" y="105">棋譜を途中で区切る</text>
  <text class="text small" x="490" y="132">各局面を入口として使う</text>
  <text class="mono left" x="378" y="162">startpos</text>
  <text class="mono left" x="378" y="184">startpos moves 7g7f</text>
  <text class="mono left" x="378" y="206">startpos moves 7g7f 3c3d</text>
  <text class="mono left" x="378" y="228">...</text>

  <path class="line" d="M 635 152 H 672"/>
  <rect class="box db" x="682" y="86" width="180" height="132"/>
  <text class="text" x="772" y="122">peta_book</text>
  <text class="text small" x="772" y="150">各途中局面から</text>
  <text class="text small" x="772" y="174">best PV を</text>
  <text class="text small" x="772" y="198">leafまで辿る</text>

  <path class="line" d="M 872 152 H 910"/>
  <rect class="box file" x="920" y="86" width="130" height="132"/>
  <text class="text" x="985" y="122">出力</text>
  <text class="mono" x="985" y="149" text-anchor="middle">book/think</text>
  <text class="mono" x="985" y="170" text-anchor="middle">sfens.txt</text>
  <text class="text small" x="985" y="198">次に掘る局面</text>

  <path class="hint" d="M 490 244 V 303 H 165 V 228"/>
  <text class="text small" x="322" y="294">1つの棋譜から複数の入口を作る</text>

  <rect class="box work" x="80" y="330" width="260" height="118"/>
  <text class="text" x="210" y="363">除外条件</text>
  <text class="text small" x="210" y="390">game ply limit 到達</text>
  <text class="text small" x="210" y="415">eval_drop_limit 以上悪化</text>

  <path class="line" d="M 350 389 H 420"/>
  <rect class="box file" x="430" y="330" width="250" height="118"/>
  <text class="text" x="555" y="363">残ったPV leaf</text>
  <text class="mono left" x="455" y="394">startpos moves ...</text>
  <text class="mono left" x="455" y="416">, eval_limit=400</text>
  <text class="mono left" x="455" y="438">, game_ply_limit=200</text>

  <path class="line" d="M 690 389 H 760"/>
  <rect class="box queue" x="770" y="330" width="220" height="118"/>
  <text class="text" x="880" y="363">enqueue</text>
  <text class="text small" x="880" y="392">手動で実行</text>
  <text class="text small" x="880" y="417">エンジンで掘る</text>
</svg>
